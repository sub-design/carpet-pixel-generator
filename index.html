<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Carpets - procedural generator</title>
<style>
  :root { --bg:#15110d; --panel:#1d1610; --line:#3a2e22; --text:#e8dcc8; --muted:#9a8a72; --accent:#c8884f; --red:#7a1518; --gold:#c8a042; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background:var(--bg); color:var(--text);
    font:14px/1.5 ui-monospace,"SF Mono",Menlo,Consolas,monospace; display:flex; min-height:100%; }
  aside { width:320px; flex:0 0 320px; background:var(--panel); background-image:repeating-linear-gradient(-45deg,transparent 0,transparent 5px,rgba(200,136,79,.035) 5px,rgba(200,136,79,.035) 6px),repeating-linear-gradient(45deg,transparent 0,transparent 5px,rgba(200,136,79,.035) 5px,rgba(200,136,79,.035) 6px); border-right:1px solid var(--line); box-shadow:inset -3px 0 0 rgba(200,136,79,.12); padding:22px 20px; overflow-y:auto; }
  .topbar { position:relative; padding-right:48px; padding-bottom:18px; margin-bottom:18px; border-bottom:1px solid var(--line); }
  .topbar::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:3px; background:repeating-linear-gradient(90deg,var(--accent) 0,var(--accent) 4px,transparent 4px,transparent 9px); opacity:.5; }
  h1 { font-size:15px; letter-spacing:.5px; margin:0 0 2px; }
  .sub { color:var(--muted); font-size:11.5px; }
  .lang { position:absolute; top:0; right:0; display:flex; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .lang button { border:0; border-left:1px solid var(--line); background:#1a140e; color:var(--muted); padding:5px 7px; cursor:pointer; font:10px/1 ui-monospace,"SF Mono",Menlo,Consolas,monospace; }
  .lang button:first-child { border-left:0; }
  .lang button.on { background:var(--accent); color:#1a140e; font-weight:600; }
  .field { margin-bottom:18px; }
  .fam { font-size:10px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin:16px 0 6px; position:relative; padding-top:14px; }
  .fam::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:repeating-linear-gradient(90deg,rgba(200,136,79,.5) 0,rgba(200,136,79,.5) 4px,transparent 4px,transparent 9px); }
  .fam:first-child { margin-top:0; padding-top:0; }
  .fam:first-child::before { display:none; }
  label.cap { display:flex; justify-content:space-between; font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:8px; }
  label.cap b { color:var(--accent); font-weight:600; }
  input[type=range] { width:100%; -webkit-appearance:none; appearance:none; height:18px; background:transparent; outline:none; cursor:pointer; }
  input[type=range]::-webkit-slider-runnable-track { height:2px; background:repeating-linear-gradient(90deg,var(--line) 0,var(--line) 5px,rgba(200,136,79,.2) 5px,rgba(200,136,79,.2) 7px); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; margin-top:-5px; background:var(--accent); border:2px solid var(--bg); box-shadow:0 0 0 1px var(--accent); transform:rotate(45deg); cursor:pointer; transition:.1s; }
  input[type=range]::-webkit-slider-thumb:hover { background:var(--gold); box-shadow:0 0 0 1px var(--gold); }
  input[type=range]::-moz-range-track { height:2px; background:repeating-linear-gradient(90deg,var(--line) 0,var(--line) 5px,rgba(200,136,79,.2) 5px,rgba(200,136,79,.2) 7px); border:none; }
  input[type=range]::-moz-range-thumb { width:12px; height:12px; background:var(--accent); border:2px solid var(--bg); border-radius:0; transform:rotate(45deg); cursor:pointer; }
  .styles { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .chip { border:1px solid var(--line); background:#1a140e; color:var(--text); padding:8px 4px; border-radius:2px; cursor:pointer; text-align:center; font-size:12px; transition:.12s; }
  .chip:hover { border-color:var(--accent); color:var(--accent); }
  .chip.on { background:var(--accent); color:#1a140e; border-color:var(--accent); font-weight:600; box-shadow:0 0 0 2px var(--panel),0 0 0 3px var(--accent); }
  .fmt { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .row { display:flex; gap:8px; }
  button.act { flex:1; border:1px solid var(--line); background:#1a140e; color:var(--text); padding:11px; border-radius:2px; cursor:pointer; font-family:inherit; font-size:12.5px; transition:.12s; }
  button.act:hover { border-color:var(--accent); color:var(--accent); box-shadow:inset 0 0 0 1px rgba(200,136,79,.08); }
  button.primary { background:var(--accent); color:#1a140e; border-color:var(--accent); font-weight:600; box-shadow:0 0 0 2px var(--panel),0 0 0 3px var(--accent); }
  button.primary:hover { color:#1a140e; filter:brightness(1.08); }
  .seedline { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:11.5px; }
  .seedline code { color:var(--text); }
  main { flex:1; display:flex; align-items:center; justify-content:center; padding:40px; min-width:0; background:radial-gradient(ellipse 75% 65% at 55% 50%,#1e1710 0%,var(--bg) 100%); }
  .frame { padding:16px; background:#0d0a07; border-radius:4px; box-shadow:0 24px 60px rgba(0,0,0,.5),inset 0 0 0 1px #2a2018; }
  canvas { display:block; image-rendering:pixelated; max-width:min(80vw,1040px); max-height:82vh; width:auto; height:auto; background:#000; }
  .note { color:var(--muted); font-size:11px; margin-top:6px; }
  @media (max-width: 760px) {
    html, body { height:auto; min-height:100%; }
    body { flex-direction:column; min-height:100vh; overflow-x:hidden; }
    aside {
      width:100%;
      max-width:100vw;
      flex:0 0 auto;
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      border-right:0;
      border-bottom:1px solid var(--line);
      padding:16px;
      overflow:visible;
    }
    .topbar { margin-bottom:0; }
    .field { margin-bottom:0; min-width:0; }
    .styles,
    .fmt { grid-template-columns:repeat(2,minmax(0,1fr)); }
    label.cap { margin-bottom:6px; font-size:10px; }
    .chip { min-height:34px; padding:8px 3px; font-size:11px; display:flex; align-items:center; justify-content:center; }
    button.act { min-height:40px; padding:10px; }
    main { width:100%; max-width:100vw; flex:1; align-items:flex-start; padding:18px 14px 24px; }
    .frame { width:100%; max-width:100%; min-width:0; padding:10px; overflow:hidden; }
    canvas { max-width:100%; max-height:62vh; margin:0 auto; }
  }
  @media (max-width: 560px) {
    aside { padding:14px; gap:11px; }
    .topbar { padding-right:50px; }
    .sub { font-size:10.5px; }
    main { padding:14px 10px 20px; }
    .frame { padding:8px; }
    canvas { width:100%; max-height:none; }
  }
</style>
</head>
<body>
<aside>
  <div class="topbar">
    <div>
      <h1 data-i18n="title">PIXEL CARPETS</h1>
      <div class="sub" data-i18n="subtitle">procedural · natural dyes</div>
    </div>
    <div class="lang" aria-label="Language">
      <button type="button" id="langEn" class="on">EN</button>
      <button type="button" id="langRu">RU</button>
    </div>
  </div>

  <div class="field field-gen">
    <div class="row">
      <button class="act primary" id="gen" data-i18n="generate">Generate</button>
    </div>
  </div>

  <div class="field field-styles">
    <div id="styles"></div>
  </div>

  <div class="field field-format">
    <label class="cap" data-i18n="format">Format</label>
    <div class="fmt" id="fmt"></div>
  </div>

  <div class="field field-range">
    <label class="cap"><span data-i18n="detail">Detail</span> <b id="resVal">140</b></label>
    <input type="range" id="res" min="72" max="216" step="4" value="140">
  </div>

  <div class="field field-range">
    <label class="cap"><span data-i18n="borders">Guard borders</span> <b id="borderVal">2</b></label>
    <input type="range" id="border" min="0" max="3" step="1" value="2">
  </div>

  <div class="field field-range">
    <label class="cap"><span data-i18n="wear">Wear</span> <b id="wearVal">0.25</b></label>
    <input type="range" id="wear" min="0" max="1" step="0.05" value="0.25">
  </div>

  <div class="field field-range">
    <label class="cap"><span data-i18n="fringe">Fringe</span> <b id="fringeVal">0.6</b></label>
    <input type="range" id="fringe" min="0" max="1" step="0.05" value="0.6">
  </div>

  <div class="field field-save">
    <div class="row">
      <button class="act" id="save">↓ PNG</button>
    </div>
  </div>

</aside>

<main>
  <div class="frame"><canvas id="c" width="800" height="533"></canvas></div>
</main>

// rotate (0-3 quarter-turns) / flip a stencil for variety
function transformStencil(s,rot,flip){
  let gg=s.map(r=>r.split(''));
  if(flip) gg=gg.map(r=>r.slice().reverse());
  for(let k=0;k<rot;k++){
    const h=gg.length,w=gg[0].length, ng=Array.from({length:w},()=>new Array(h));
    for(let r=0;r<h;r++) for(let c=0;c<w;c++) ng[c][h-1-r]=gg[r][c];
    gg=ng;
  }
  return gg.map(r=>r.join(''));
}

// ===== grid helpers (rectangular, mirror on both axes) =====
const clampv=(v,a,b)=>v<a?a:v>b?b:v;
function pick(rnd,a){ return a[(rnd()*a.length)|0]; }
function makeGrid(W,H,fill){ return Array.from({length:H},()=>new Array(W).fill(fill)); }
let CLIP=null;   // optional {x0,y0,x1,y1} rectangle to clip writes (for edge half-medallions)
function put1(g,W,H,x,y,v){
  if(x<0||y<0||x>=W||y>=H) return;
  if(CLIP && (x<CLIP.x0||x>CLIP.x1||y<CLIP.y0||y>CLIP.y1)) return;
  g[y][x]=v;
}
function set4(g,W,H,x,y,v){
  put1(g,W,H,x,y,v); put1(g,W,H,W-1-x,y,v); put1(g,W,H,x,H-1-y,v); put1(g,W,H,W-1-x,H-1-y,v);
}
function setRingRect(g,W,H,e,v){
  const ax=e,bx=W-1-e, ay=e,by=H-1-e; if(ax>bx||ay>by) return;
  for(let x=ax;x<=bx;x++){ g[ay][x]=v; g[by][x]=v; }
  for(let y=ay;y<=by;y++){ g[y][ax]=v; g[y][bx]=v; }
}
function guardRect(g,W,H,e,cA,cB){
  const ax=e,bx=W-1-e, ay=e,by=H-1-e; if(ax>bx||ay>by) return;
  const s=(x,y)=>{ g[y][x]=((x+y)&1)?cA:cB; };
  for(let x=ax;x<=bx;x++){ s(x,ay); s(x,by); }
  for(let y=ay;y<=by;y++){ s(ax,y); s(bx,y); }
}

// stamp a shaded stencil (mirrored)
function stampF(g,W,H,cx,cy,sten,theme,leaf,fs){
  const map={o:theme[0],m:theme[1],l:theme[2],c:theme[3],g:leaf};
  const h=sten.length,w=sten[0].length, lo=fs,hiX=W-1-fs,hiY=H-1-fs;
  const y0=cy-(h>>1),x0=cx-(w>>1);
  for(let r=0;r<h;r++) for(let c=0;c<w;c++){
    const ch=sten[r][c]; if(ch==='.') continue;
    const x=x0+c,y=y0+r;
    if(x<=lo||x>=hiX||y<=lo||y>=hiY) continue;
    set4(g,W,H,x,y,map[ch]);
  }
}
function vine(g,W,H,x0,y0,x1,y1,v,fs){
  const dx=Math.sign(x1-x0),dy=Math.sign(y1-y0),n=Math.abs(x1-x0);
  let x=x0,y=y0;
  for(let i=0;i<=n;i++){ if(x>fs&&x<W-1-fs&&y>fs&&y<H-1-fs) set4(g,W,H,x,y,v); x+=dx; y+=dy; }
}

// ===== borders =====
function lightestIdx(cols){ let bi=0,bv=-1; cols.forEach((h,i)=>{ const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); const l=r*0.3+g*0.59+b*0.11; if(l>bv){bv=l;bi=i;} }); return bi; }
function darkestIdx(cols){ let bi=0,bv=1e9; cols.forEach((h,i)=>{ const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); const l=r*0.3+g*0.59+b*0.11; if(l<bv){bv=l;bi=i;} }); return bi; }
function bandFill(g,W,H,e,w,v){ for(let k=0;k<w;k++) setRingRect(g,W,H,e+k,v); }

// zigzag / running-dog band
function bandSawtooth(g,W,H,e,w,bg,fg){
  bandFill(g,W,H,e,w,bg);
  const w1=Math.max(1,w-1), P2=2*w1;
  const tri=t=>{ const m=((t%P2)+P2)%P2; return m<=w1? m : P2-m; };
  for(let x=e;x<=W-1-e;x++) set4(g,W,H,x, e+tri(x-e), fg);
  for(let y=e;y<=H-1-e;y++) set4(g,W,H, e+tri(y-e), y, fg);
}
// narrow dark band with little florets
function bandDarkFloral(g,W,H,e,w,P){
  const B=P.border; bandFill(g,W,H,e,w,B.bg);
  const mid=e+(w>>1), per=Math.max(3,w+1);
  const flo=(cx,cy)=>{ set4(g,W,H,cx,cy,B.lite); set4(g,W,H,cx-1,cy,B.gA); set4(g,W,H,cx+1,cy,B.gA); set4(g,W,H,cx,cy-1,B.fg); };
  for(let x=e+2;x<=W/2;x+=per) flo(x,mid);
  for(let y=e+2;y<=H/2;y+=per) flo(mid,y);
}
// main wide light band: alternating motifs on a vine
function bandMain(g,W,H,e,w,P,field){
  bandFill(g,W,H,e,w,field);
  const mid=e+(w>>1), per=Math.max(4,w);
  for(let x=e+1;x<W-1-e;x++) set4(g,W,H,x,mid,P.stem);
  for(let y=e+1;y<H-1-e;y++) set4(g,W,H,mid,y,P.stem);
  const thA=P.themes[0], thB=P.themes[Math.min(2,P.themes.length-1)];
  const bm=P.borderMotifs||["flower5","star5"];
  let i=0;
  for(let x=e+per;x<=W/2;x+=per,i++) stampF(g,W,H,x,mid,STENCILS[bm[i%bm.length]],(i&1)?thB:thA,P.leaf,0);
  i=0;
  for(let y=e+per;y<=H/2;y+=per,i++) stampF(g,W,H,mid,y,STENCILS[bm[i%bm.length]],(i&1)?thB:thA,P.leaf,0);
  stampF(g,W,H,mid,mid,STENCILS[bm[0]],thA,P.leaf,0);
  const small=P.fillerPool?P.fillerPool[0]:"bud3";
  for(let x=e+per+(per>>1);x<=W/2;x+=per) stampF(g,W,H,x,mid,STENCILS[small],thB,P.leaf,0);
  for(let y=e+per+(per>>1);y<=H/2;y+=per) stampF(g,W,H,mid,y,STENCILS[small],thB,P.leaf,0);
}
function bandRosetteMarch(g,W,H,e,w,P,field){
  bandFill(g,W,H,e,w,field);
  const mid=e+(w>>1), per=Math.max(5,w+2);
  const thA=P.themes[0], thB=P.themes[Math.min(1,P.themes.length-1)];
  const bm=P.borderMotifs||["rosette5b","cross3"];
  for(let x=e+1;x<W-1-e;x++) set4(g,W,H,x,mid,(x&1)?P.stem:P.border.fg);
  for(let y=e+1;y<H-1-e;y++) set4(g,W,H,mid,y,(y&1)?P.stem:P.border.fg);
  let i=0;
  for(let x=e+per;x<=W/2;x+=per,i++) stampF(g,W,H,x,mid,STENCILS[bm[i%bm.length]],(i&1)?thB:thA,P.leaf,0);
  i=0;
  for(let y=e+per;y<=H/2;y+=per,i++) stampF(g,W,H,mid,y,STENCILS[bm[i%bm.length]],(i&1)?thB:thA,P.leaf,0);
  stampF(g,W,H,mid,mid,STENCILS[bm[0]],thA,P.leaf,0);
}

// Safavid cartouche band: alternating elongated cartouches and round rosettes on a coloured ground
function bandCartouche(g,W,H,e,w,P,field){
  const B=P.border, o=P.o;
  bandFill(g,W,H,e,w,field);
  const mid=e+(w>>1);
  const hw=Math.max(1,(w>>1)-1);                 // cartouche half-thickness
  const cl=Math.max(4,Math.round(w*1.5));        // cartouche half-length
  const ros=Math.max(2,(w>>1)-1);
  const step=cl+ros+2;                            // centre spacing of cartouche↔rosette
  const cm=STENCILS[(P.borderMotifs&&P.borderMotifs[1])||"cartoucheMotif"];
  // mirrored mini-rosette (drawMiniDiamond itself does not mirror)
  const rose=(cx,cy)=>{ for(let d=ros;d>=0;d--){ const v=[o,B.fg,B.lite][(ros-d)%3];
      for(let k=-d;k<=d;k++){ const j=d-Math.abs(k); set4(g,W,H,cx+k,cy+j,v); set4(g,W,H,cx+k,cy-j,v); } } };
  // one cartouche, oriented along the band (horiz=true along x, else along y)
  const cart=(cx,cy,horiz)=>{
    for(let a=-cl;a<=cl;a++) for(let b=-hw;b<=hw;b++){
      const str=Math.abs(a)-(cl-hw);
      const rr= str>0 ? Math.hypot(str,b)/hw : Math.abs(b)/hw;
      if(rr>1) continue;
      let v=B.fg; if(rr>0.78) v=o; else if(rr>0.55) v=B.lite;
      set4(g,W,H, cx+(horiz?a:b), cy+(horiz?b:a), v);
    }
    stampF(g,W,H,cx,cy,cm,[o,B.lite,field,B.fg],B.lite,0);
  };
  let i=0; for(let x=e+cl+1; x<=W/2; x+=step, i++){ (i&1)? rose(x,mid) : cart(x,mid,true); }
  i=0;     for(let y=e+cl+1; y<=H/2; y+=step, i++){ (i&1)? rose(mid,y) : cart(mid,y,false); }
  rose(mid,mid);                                  // corner rosette (set4 → all four corners)
}
// engsi/hatchli band: a march of cream ashik (X) motifs on a dark ground, with beaded squares between
function bandEngsi(g,W,H,e,w,P,field){
  const B=P.border, o=P.o;
  bandFill(g,W,H,e,w,field);
  const mid=e+(w>>1), per=Math.max(6,w+1), off=Math.round(per*0.6);
  const th=[o,B.fg,B.lite,B.lite];                 // cream X with red inner accents
  for(let x=e+off;x<=W/2;x+=per) stampF(g,W,H,x,mid,STENCILS.ashikX,th,P.leaf,0);
  for(let y=e+off;y<=H/2;y+=per) stampF(g,W,H,mid,y,STENCILS.ashikX,th,P.leaf,0);
  stampF(g,W,H,mid,mid,STENCILS.ashikX,th,P.leaf,0);
  const sq=(cx,cy)=>{ set4(g,W,H,cx,cy,B.lite); set4(g,W,H,cx-1,cy,B.fg); set4(g,W,H,cx+1,cy,B.fg); };
  for(let x=e+off+(per>>1);x<=W/2;x+=per) sq(x,mid);
  for(let y=e+off+(per>>1);y<=H/2;y+=per) sq(mid,y);
}
// undulating cream vine: a sine stem with blossoms alternating above/below the midline
function bandVineWave(g,W,H,e,w,P,field){
  bandFill(g,W,H,e,w,field);
  const mid=e+(w>>1), per=Math.max(5,w), amp=Math.max(1,(w>>1)-1);
  const wave=t=>Math.round(Math.sin(t/per*Math.PI*2)*amp);
  for(let x=e+1;x<W-1-e;x++) set4(g,W,H,x,mid+wave(x-e),P.stem);
  for(let y=e+1;y<H-1-e;y++) set4(g,W,H,mid+wave(y-e),y,P.stem);
  const bm=P.borderMotifs||["afghanHook","rosette5b"];
  let i=0;
  for(let x=e+per;x<=W/2;x+=per,i++) stampF(g,W,H,x,mid+((i&1)?-amp:amp),STENCILS[bm[i%bm.length]],P.themes[i%P.themes.length],P.leaf,0);
  i=0;
  for(let y=e+per;y<=H/2;y+=per,i++) stampF(g,W,H,mid+((i&1)?-amp:amp),y,STENCILS[bm[i%bm.length]],P.themes[i%P.themes.length],P.leaf,0);
}
function drawBorders(g,W,H,P,bands){
  const o=P.o, B=P.border, u=Math.min(W,H);
  const field=(P.borderStyle==="darkFloral"||P.borderStyle==="rosetteMarch"||P.borderStyle==="cartouche"||P.borderStyle==="engsiX")?B.bg:lightestIdx(P.colors);
  let e=0;
  const line=v=>{ setRingRect(g,W,H,e,v); e++; };
  const candy=()=>{ guardRect(g,W,H,e,B.gA,B.gB); e++; };
  line(o); candy();
  if(bands>=2){ const wd=clampv(Math.round(u/40),2,4); bandDarkFloral(g,W,H,e,wd,P); e+=wd; candy(); }
  line(o);
  if(P.borderStyle==="cartouche"){ const wm=clampv(Math.round(u/13),6,13); bandCartouche(g,W,H,e,wm,P,field); e+=wm; }
  else if(P.borderStyle==="engsiX"){ const wm=clampv(Math.round(u/14),5,11); bandEngsi(g,W,H,e,wm,P,field); e+=wm; }
  else if(P.borderStyle==="creamVine"){ const wm=clampv(Math.round(u/15),5,11); bandVineWave(g,W,H,e,wm,P,field); e+=wm; }
  else { const wm=clampv(Math.round(u/15),5,11); bandMain(g,W,H,e,wm,P,field); e+=wm; }
  if(P.borderStyle==="rosetteMarch"||P.borderStyle==="creamGarden"){
    line(o);
    const wr=clampv(Math.round(u/18),5,10);
    bandRosetteMarch(g,W,H,e,wr,P,P.borderStyle==="creamGarden"?lightestIdx(P.colors):B.bg); e+=wr;
  }
  line(o); candy();
  if(bands>=1){ const ws=clampv(Math.round(u/44),2,4); bandSawtooth(g,W,H,e,ws,B.bg,B.gA); e+=ws; line(o); }
  return e;
}

// ===== dense allover floral field =====
function layoutAllover(g,W,H,fs,P,rnd,density,bold){
  const hW=W/2,hH=H/2;
  let S=clampv(Math.round(Math.min(W,H)/(8+density)), bold?9:5, bold?16:11);
  if(P.allScale) S=Math.round(S*P.allScale);            // sparser lattice → ground colour breathes
  const flowers=P.motifPool||FLOWERS, fillers=P.fillerPool||FILLERS;
  const mot=pool=>transformStencil(STENCILS[pick(rnd,pool)], rnd()*4|0, rnd()<0.5);
  // main lattice: vines + flowers (each randomly rotated/flipped)
  for(let y=fs+S; y<=hH; y+=S){
    for(let x=fs+S; x<=hW; x+=S){
      vine(g,W,H,x,y,x+S,y+S,P.stem,fs);
      vine(g,W,H,x,y,x+S,y-S,P.stem,fs);
      stampF(g,W,H,x,y,mot(flowers),pick(rnd,P.themes),P.leaf,fs);
    }
  }
  // offset lattice: buds/leaves between
  const o2=Math.floor(S/2);
  for(let y=fs+o2+S; y<=hH; y+=S){
    for(let x=fs+o2+S; x<=hW; x+=S){
      stampF(g,W,H,x,y,mot(fillers),pick(rnd,P.themes),P.leaf,fs);
    }
  }
  // fine filler speckle (symmetric)
  const area=(hW-fs)*(hH-fs), n=Math.floor(area/(26*(P.allScale?P.allScale*1.7:1)));
  for(let i=0;i<n;i++){
    const x=fs+1+Math.floor(rnd()*(hW-fs-1));
    const y=fs+1+Math.floor(rnd()*(hH-fs-1));
    set4(g,W,H,x,y,P.filler);
  }
}

// open field: sparse detached floral sprays, clean ground, halo around the medallion
function stampSpray(g,W,H,cx,cy,P,rnd,fs){
  const th=pick(rnd,P.themes);
  const motifs=P.motifPool||FLOWERS, fillers=P.fillerPool||["leaf3","bud3"];
  // sparse field: only small filler motifs on plain ground (the big guls are the row medallions)
  if(P.fieldStyle==="sparse"){
    stampF(g,W,H,cx,cy,transformStencil(STENCILS[pick(rnd,fillers)],rnd()*4|0,rnd()<.5),th,P.leaf,fs);
    if(rnd()<0.4) stampF(g,W,H,cx,cy+3,STENCILS[pick(rnd,fillers)],th,P.leaf,fs);
    return;
  }
  stampF(g,W,H,cx,cy,transformStencil(STENCILS[pick(rnd,motifs)],rnd()*4|0,rnd()<.5),th,P.leaf,fs);
  stampF(g,W,H,cx,cy+3,STENCILS[pick(rnd,fillers)],th,P.leaf,fs);
  stampF(g,W,H,cx-3,cy+1,transformStencil(STENCILS[pick(rnd,fillers)],1,false),th,P.leaf,fs);
  stampF(g,W,H,cx+3,cy+1,transformStencil(STENCILS[pick(rnd,fillers)],1,true),th,P.leaf,fs);
  if(rnd()<0.5) stampF(g,W,H,cx,cy-4,STENCILS[pick(rnd,fillers)],pick(rnd,P.themes),P.leaf,fs);
}
function layoutOpen(g,W,H,fs,P,rnd,density,haloR){
  const hW=W/2,hH=H/2,cx=W/2,cy=H/2,u=Math.min(W,H);
  let S=clampv(Math.round(u/(6+density)),8,20);            // airy but not barren
  if(P.fieldStyle==="sparse") S=clampv(Math.round(S*1.5),12,30);   // calm ground between large guls
  const hx=haloR||0, hy=hx*1.12;                            // halo matches the actual medallion
  for(let y=fs+Math.round(S*0.7); y<=hH; y+=S){
    for(let x=fs+Math.round(S*0.7); x<=hW; x+=S){
      const px=x+Math.round((rnd()*2-1)*S*0.18), py=y+Math.round((rnd()*2-1)*S*0.18);
      if(hx>0){ const ndx=(px-cx)/hx, ndy=(py-cy)/hy; if(ndx*ndx+ndy*ndy<1.05) continue; }
      if(P.fieldStyle==="sparse" && rnd()<0.4) continue;   // leave ~40% of cells as plain ground
      stampSpray(g,W,H,px,py,P,rnd,fs);
    }
  }
}
// scatter stylised birds/animals in the field (mirrored → confronting pairs)
function scatterAnimals(g,W,H,fs,P,rnd,haloR){
  const hW=W/2,hH=H/2,cx=W/2,cy=H/2,u=Math.min(W,H);
  const mrx=haloR||u*0.33, mry=mrx*1.12;
  const count=2+Math.floor(rnd()*3);
  let placed=0,tries=0;
  while(placed<count && tries<count*14){
    tries++;
    const x=fs+5+Math.floor(rnd()*Math.max(1,hW-fs-8));
    const y=fs+5+Math.floor(rnd()*Math.max(1,hH-fs-8));
    const ndx=(x-cx)/mrx, ndy=(y-cy)/mry;
    if(ndx*ndx+ndy*ndy<1.15) continue;          // keep clear of the medallion
    const st=transformStencil(STENCILS[pick(rnd,ANIMALS)],0,rnd()<0.5);
    stampF(g,W,H,x,y,st,pick(rnd,P.themes),P.leaf,fs);
    placed++;
  }
}

// ===== medallion + spandrels =====
function ringDiamond(g,W,H,cx,cy,d,v){ for(let i=0;i<=d;i++){ const j=d-i; set4(g,W,H,cx+i,cy+j,v); set4(g,W,H,cx-i,cy+j,v); } }
function fillDiamond(g,W,H,cx,cy,r,v){ for(let dy=-r;dy<=r;dy++){ const w=r-Math.abs(dy); for(let dx=-w;dx<=w;dx++) set4(g,W,H,cx+dx,cy+dy,v); } }
function drawMedallion(g,W,H,cx,cy,r,P,rnd,opts){
  const style=(opts&&opts.style)||P.medalStyle;
  if(style==="star") drawMedallionStar(g,W,H,cx,cy,r,P,rnd,opts);
  else if(style==="curv") drawMedallionCurv(g,W,H,cx,cy,r,P,rnd,opts);
  else if(style==="sovietClassic") drawMedallionSovietClassic(g,W,H,cx,cy,r,P,rnd,opts);
  else if(style==="ardabil") drawMedallionArdabil(g,W,H,cx,cy,r,P,rnd,opts);
  else if(style==="lobed") drawMedallionLobed(g,W,H,cx,cy,r,P,rnd,opts);
  else if(style==="mandorla") drawMedallionMandorla(g,W,H,cx,cy,r,P,rnd,opts);
  else if(style==="afghanElephant") drawAfghanElephantMedallion(g,W,H,cx,cy,r,P,rnd);
  else if(style==="afghanStepped") drawAfghanSteppedMedallion(g,W,H,cx,cy,r,P,rnd);
  else if(style==="afghanLobed") drawAfghanLobedMedallion(g,W,H,cx,cy,r,P,rnd);
  else drawMedallionStep(g,W,H,cx,cy,r,P,rnd);
}
function drawAfghanElephantMedallion(g,W,H,cx,cy,r,P,rnd){
  const M=P.medal, ax=Math.max(4,Math.round(r*0.95)), ay=Math.max(4,Math.round(r*1.12));
  for(let dy=-ay;dy<=ay;dy++) for(let dx=-ax;dx<=ax;dx++){
    const d=Math.abs(dx)/ax+Math.abs(dy)/ay;
    if(d>1.18) continue;
    let v=M.bg;
    if(d>1.04) v=P.o; else if(d>0.88) v=M.ring;
    if(Math.abs(dx)<2 || Math.abs(dy)<2) v=M.ring;
    set4(g,W,H,cx+dx,cy+dy,v);
  }
  stampF(g,W,H,cx,cy,STENCILS.afghanElephantGul,[P.o,M.bg,M.lite,M.core],M.lite,0);
  const off=Math.round(r*0.55);
  stampF(g,W,H,cx-off,cy,STENCILS.afghanComb,[P.o,M.ring,M.lite,M.core],M.lite,0);
  stampF(g,W,H,cx+off,cy,transformStencil(STENCILS.afghanComb,2,true),[P.o,M.ring,M.lite,M.core],M.lite,0);
  drawMiniDiamond(g,W,H,cx,cy-Math.round(r*0.75),2,[M.lite,M.ring,P.o]);
}
function drawAfghanSteppedMedallion(g,W,H,cx,cy,r,P,rnd){
  const M=P.medal;
  fillDiamond(g,W,H,cx,cy,r,M.bg);
  for(let d=r;d>Math.max(2,r-4);d--) ringDiamond(g,W,H,cx,cy,d,d&1?P.o:M.ring);
  for(let t=-r;t<=r;t+=2){
    const j=r-Math.abs(t);
    set4(g,W,H,cx+t,cy+j+1,M.ring); set4(g,W,H,cx+t,cy-j-1,M.ring);
  }
  const r2=Math.max(3,Math.round(r*0.55));
  fillDiamond(g,W,H,cx,cy,r2,M.lite);
  ringDiamond(g,W,H,cx,cy,r2,P.o);
  stampF(g,W,H,cx,cy,STENCILS.afghanSteppedDiamond,[P.o,M.ring,M.lite,M.core],P.leaf,0);
}
function drawAfghanLobedMedallion(g,W,H,cx,cy,r,P,rnd){
  const M=P.medal, R=rnd||Math.random, rx=r*1.05, ry=r*1.05, amp=0.20, lobes=8, ph=R()*6.28;
  const ext=Math.ceil(r*(1+amp))+2;
  for(let dy=-ext;dy<=ext;dy++) for(let dx=-ext;dx<=ext;dx++){
    const nx=dx/rx, ny=dy/ry, rr=Math.hypot(nx,ny), ang=Math.atan2(ny,nx);
    const edge=1+amp*Math.cos(lobes*ang+ph);
    if(rr>edge) continue;
    let v=M.bg;
    if(rr>edge-0.09) v=P.o; else if(rr>edge-0.18) v=M.ring;
    if(Math.abs(Math.sin(4*ang))*rr<0.05 && rr>0.25) v=M.lite;
    set4(g,W,H,cx+dx,cy+dy,v);
  }
  stampF(g,W,H,cx,cy,STENCILS.afghanLobedBlack,[P.o,M.ring,M.lite,M.core],P.leaf,0);
}
function drawMedallionStep(g,W,H,cx,cy,r,P,rnd){
  const M=P.medal;
  fillDiamond(g,W,H,cx,cy,r,M.bg);
  ringDiamond(g,W,H,cx,cy,r,P.o);
  ringDiamond(g,W,H,cx,cy,r-1,M.ring);
  // toothed edge
  for(let t=-r+2;t<=r-2;t+=3){ const j=r-Math.abs(t); set4(g,W,H,cx+t,cy+j+1,M.ring); set4(g,W,H,cx+t,cy-j-1,M.ring); }
  const r2=Math.floor(r*0.6);
  ringDiamond(g,W,H,cx,cy,r2,M.lite);
  ringDiamond(g,W,H,cx,cy,r2-1,M.ring);
  // inner dot lattice for detail
  for(let dy=-r2+2;dy<=r2-2;dy++){ const w=r2-2-Math.abs(dy); for(let dx=-w;dx<=w;dx++) if(((dx+dy)&1)===0) set4(g,W,H,cx+dx,cy+dy,M.lite); }
  // central rosette cluster
  stampF(g,W,H,cx,cy,STENCILS.rosette7,[P.o,M.ring,M.lite,M.core],M.lite,0);
  stampF(g,W,H,cx,cy-Math.floor(r2*0.6),STENCILS.bud3,[P.o,M.core,M.lite,M.lite],M.lite,0);
  stampF(g,W,H,cx+Math.floor(r2*0.6),cy,STENCILS.bud3,[P.o,M.core,M.lite,M.lite],M.lite,0);
  // vertical pendants
  fillDiamond(g,W,H,cx,cy-r-3,2,M.bg); ringDiamond(g,W,H,cx,cy-r-3,2,M.ring); set4(g,W,H,cx,cy-r-3,M.core);
}
// Soviet wall-carpet classic: red field, ivory lobed centre, dark arabesque tracery.
function drawMedallionSovietClassic(g,W,H,cx,cy,r,P,rnd,opts){
  const M=P.medal, R=rnd||Math.random, out=P.o;
  const rx=Math.max(5,r*1.05), ry=Math.max(5,r*0.92);
  const ph=R()*6.28, lobes=12, amp=0.12;
  const ex=Math.ceil(rx*(1+amp))+2, ey=Math.ceil(ry*(1+amp))+2;
  for(let dy=-ey;dy<=ey;dy++) for(let dx=-ex;dx<=ex;dx++){
    const nx=dx/rx, ny=dy/ry, rr=Math.hypot(nx,ny), ang=Math.atan2(ny,nx);
    const edge=1+amp*Math.cos(lobes*ang+ph);
    if(rr>edge) continue;
    const t=rr/edge;
    let v=M.bg;
    if(t>0.91) v=out;
    else if(t>0.82) v=M.ring;
    else if(t>0.73) v=M.bg;
    else if(t>0.58&&t<0.65) v=M.core;
    else if(t>0.53&&t<0.58) v=out;
    set4(g,W,H,cx+dx,cy+dy,v);
  }
  for(let a=0;a<Math.PI*2;a+=Math.PI/4){
    const px=Math.round(cx+Math.cos(a)*rx*0.56), py=Math.round(cy+Math.sin(a)*ry*0.56);
    const th=(Math.round(a/(Math.PI/4))&1)?[out,M.core,M.bg,M.ring]:[out,M.ring,M.bg,M.core];
    stampF(g,W,H,px,py,STENCILS.palmette7,th,P.leaf,0);
  }
  stampF(g,W,H,cx,cy,STENCILS.shahAbbasi,[out,M.ring,M.bg,M.core],P.leaf,0);
  const d=Math.max(3,Math.round(r*0.42));
  fillDiamond(g,W,H,cx,cy-d,2,M.lite); ringDiamond(g,W,H,cx,cy-d,2,out); set4(g,W,H,cx,cy-d,M.core);
  fillDiamond(g,W,H,cx+d,cy,2,M.lite); ringDiamond(g,W,H,cx+d,cy,2,out); set4(g,W,H,cx+d,cy,M.core);
  const pr=Math.max(2,Math.round(r*0.16));
  fillDiamond(g,W,H,cx,cy,pr,M.core);
  ringDiamond(g,W,H,cx,cy,pr,out);
  stampF(g,W,H,cx,cy,STENCILS.rosette7,[out,M.lite,M.bg,M.core],P.leaf,0);
  const finY=Math.round(ry*1.05);
  fillDiamond(g,W,H,cx,cy-finY,Math.max(2,Math.round(r*0.16)),M.bg);
  ringDiamond(g,W,H,cx,cy-finY,Math.max(2,Math.round(r*0.16)),out);
  stampF(g,W,H,cx,cy-finY,STENCILS.rosette5b,[out,M.lite,M.bg,M.core],P.leaf,0);
}
// curvilinear foliated medallion (city Persian): lobed elongated ogee + pointed finials
function drawMedallionCurv(g,W,H,cx,cy,r,P,rnd,opts){
  const M=P.medal, R=rnd||Math.random;
  const bg=(opts&&opts.dark)?darkestIdx(P.colors):M.bg;
  const rx=r*0.82, ry=r*1.34, amp=0.11;
  const lobes=10+2*Math.floor(R()*3), ph=R()*6.28;
  const ex=Math.ceil(rx*(1+amp))+1, ey=Math.ceil(ry*(1+amp))+1;
  for(let dy=-ey;dy<=ey;dy++) for(let dx=-ex;dx<=ex;dx++){
    const nx=dx/rx, ny=dy/ry, rr=Math.hypot(nx,ny);
    if(rr>1+amp) continue;
    const Rb=1+amp*Math.cos(lobes*Math.atan2(ny,nx)+ph);
    if(rr>Rb) continue;
    const t=rr/Rb;
    let v=bg;
    if(t>0.90) v=P.o;                 // foliated outline
    else if(t>0.80) v=M.lite;         // cream inner highlight
    else if(t>0.50&&t<=0.585) v=M.ring;   // concentric ring
    else if(t>0.46&&t<=0.50) v=M.lite;
    set4(g,W,H,cx+dx,cy+dy,v);
  }
  // pointed pendant finials (one draw mirrors to top & bottom)
  const fw=Math.max(2,Math.round(rx*0.36)), fh=Math.max(3,Math.round(ry*0.5));
  const fyc=Math.round(ry*(1+amp))+Math.round(fh*0.5);
  for(let dy=-fh;dy<=fh;dy++) for(let dx=-fw;dx<=fw;dx++){
    const e=Math.abs(dx)/fw+Math.abs(dy)/fh; if(e>1) continue;
    let v=bg; if(e>0.82) v=P.o; else if(e>0.55) v=M.ring; else v=M.lite;
    set4(g,W,H,cx+dx,cy-fyc+dy,v);
  }
  // inner floral cluster
  stampF(g,W,H,cx,cy,STENCILS.rosette7,[P.o,M.ring,M.lite,M.core],M.lite,0);
  stampF(g,W,H,cx,cy-Math.round(ry*0.34),STENCILS.bud3,[P.o,M.core,M.lite,M.lite],M.lite,0);
  stampF(g,W,H,cx,cy+Math.round(ry*0.34),STENCILS.bud3,[P.o,M.core,M.lite,M.lite],M.lite,0);
  stampF(g,W,H,cx+Math.round(rx*0.5),cy,STENCILS.bud3,[P.o,M.core,M.lite,M.lite],M.lite,0);
}
// radial sunburst medallion (Soviet/city Persian): N-point star, concentric cusped rings,
// lacy cream tracery on the ground colour, spokes, long pendants
function drawMedallionStar(g,W,H,cx,cy,r,P,rnd,opts){
  const R=rnd||Math.random, M=P.medal;
  const N=16, rx=r*1.0, ry=r*1.0, amp=0.17, ph=R()*6.28;
  const cream=M.ring, accent=M.lite, ground=(opts&&opts.dark)?darkestIdx(P.colors):P.g, out=P.o, core=M.core;
  const ext=Math.ceil(Math.max(rx,ry)*(1+amp))+1;
  const tiers=[{f:0.80,n:N},{f:0.60,n:N},{f:0.42,n:8},{f:0.27,n:8}];
  for(let dy=-ext;dy<=ext;dy++) for(let dx=-ext;dx<=ext;dx++){
    const nx=dx/rx, ny=dy/ry, rr=Math.hypot(nx,ny), ang=Math.atan2(ny,nx);
    const R0=1+amp*Math.cos(N*ang+ph);
    if(rr>R0) continue;
    let v=ground;                                   // clean ground inside the star
    if(rr>R0-0.07) v=cream; else if(rr>R0-0.12) v=out;   // rim
    for(const t of tiers){                          // concentric cusped rings
      const tr=t.f*(1+amp*0.9*Math.cos(t.n*ang+ph));
      const d=Math.abs(rr-tr);
      if(d<0.045) v=cream; else if(d<0.075 && v===ground) v=out;
    }
    set4(g,W,H,cx+dx,cy+dy,v);
  }
  // sunburst spokes from centre to each point
  for(let k=0;k<N;k++){
    const a=ph+k*2*Math.PI/N, Rk=1+amp*Math.cos(N*a+ph);
    for(let rad=0.20; rad<=Rk-0.03; rad+=0.03)
      set4(g,W,H, Math.round(cx+Math.cos(a)*rad*rx), Math.round(cy+Math.sin(a)*rad*ry), cream);
  }
  // central rosette
  stampF(g,W,H,cx,cy,STENCILS.daisy7,[out,accent,cream,core],cream,0);
  // long pendant (mirrored to top & bottom by set4)
  starPendant(g,W,H,cx, cy-Math.round(ry*(1+amp))-1, Math.round(ry*0.45), P);
}
function starPendant(g,W,H,cx,topY,len,P){
  const M=P.medal, cream=M.ring, out=P.o, core=M.core, accent=M.lite;
  for(let k=0;k<len;k++) set4(g,W,H,cx, topY-k, cream);                 // stem
  stampF(g,W,H,cx, topY-Math.round(len*0.45), STENCILS.palmette5,[out,accent,cream,core],cream,0);
  stampF(g,W,H,cx, topY-len, STENCILS.star5,[out,cream,cream,core],cream,0);   // finial tip
}
// Ardabil-type: golden sunburst disc, ring of 16 radiating pendant-cartouches, two hanging mosque lamps
function drawMedallionArdabil(g,W,H,cx,cy,r,P,rnd,opts){
  const M=P.medal, out=P.o, R=rnd||Math.random;
  const N=16, amp=0.05, ph=R()*6.28, rx=r, ry=r;
  const dk=darkestIdx(P.colors);
  const ext=Math.ceil(r*1.05)+1;
  for(let dy=-ext;dy<=ext;dy++) for(let dx=-ext;dx<=ext;dx++){
    const nx=dx/rx, ny=dy/ry, rr=Math.hypot(nx,ny), ang=Math.atan2(ny,nx);
    const R0=1+amp*Math.cos(N*ang+ph);
    if(rr>R0) continue;
    let v=M.bg;                                   // gold disc
    if(rr>R0-0.06) v=out; else if(rr>R0-0.12) v=M.ring;
    else if(rr>0.66&&rr<0.74) v=M.core;           // inner red ring
    else if(rr>0.60&&rr<0.66) v=M.ring;
    set4(g,W,H,cx+dx,cy+dy,v);
  }
  // ring of small pointed cartouches just outside the disc, alternating red / indigo
  const Rc=Math.round(r*1.16), pr=Math.max(2,Math.round(r*0.16));
  for(let k=0;k<N;k++){
    const a=ph+k*2*Math.PI/N, px=Math.round(cx+Math.cos(a)*Rc), py=Math.round(cy+Math.sin(a)*Rc);
    drawMiniDiamond(g,W,H,px,py,pr,[out,(k&1)?M.core:dk,M.lite]);
  }
  // central rosette
  stampF(g,W,H,cx,cy,STENCILS.daisy7,[out,M.core,M.ring,M.lite],M.ring,0);
  // hanging mosque lamps on the long axis (set4 mirrors to top & bottom)
  stampF(g,W,H,cx,cy-Math.round(r*1.42),STENCILS.mosqueLamp,[out,M.core,M.ring,M.lite],M.ring,0);
}
// Salting-type: 16-lobe cusped scalloped rosette medallion
function drawMedallionLobed(g,W,H,cx,cy,r,P,rnd,opts){
  const M=P.medal, out=P.o, R=rnd||Math.random;
  const bg=(opts&&opts.dark)?darkestIdx(P.colors):M.bg;
  const N=16, amp=0.13, ph=R()*6.28, rx=r, ry=r*1.05;
  const ext=Math.ceil(Math.max(rx,ry)*(1+amp))+1;
  for(let dy=-ext;dy<=ext;dy++) for(let dx=-ext;dx<=ext;dx++){
    const nx=dx/rx, ny=dy/ry, rr=Math.hypot(nx,ny), ang=Math.atan2(ny,nx);
    const R0=1+amp*Math.cos(N*ang+ph);
    if(rr>R0) continue;
    let v=bg;
    if(rr>R0-0.06) v=out; else if(rr>R0-0.13) v=M.ring;
    else if(rr>0.66&&rr<0.74) v=M.lite;           // inner gold ring
    else if(rr>0.40&&rr<0.46) v=M.ring;
    set4(g,W,H,cx+dx,cy+dy,v);
  }
  stampF(g,W,H,cx,cy,STENCILS.rosette7,[out,M.core,M.lite,M.ring],M.lite,0);
  fillDiamond(g,W,H,cx,cy-r-3,2,bg); ringDiamond(g,W,H,cx,cy-r-3,2,M.ring); set4(g,W,H,cx,cy-r-3,M.core);
}
// Rothschild-type: ivory pointed-oval (mandorla) with quatrefoil core + pointed finials
function drawMedallionMandorla(g,W,H,cx,cy,r,P,rnd,opts){
  const M=P.medal, out=P.o;
  const bg=(opts&&opts.dark)?darkestIdx(P.colors):M.bg;
  const rx=r*0.74, ry=r*1.28;
  const ex=Math.ceil(rx)+1, ey=Math.ceil(ry)+2;
  for(let dy=-ey;dy<=ey;dy++) for(let dx=-ex;dx<=ex;dx++){
    const nx=dx/rx, ny=dy/ry, rr=Math.hypot(nx,ny);
    if(rr>1) continue;
    let v=bg;
    if(rr>0.92) v=out; else if(rr>0.83) v=M.ring;
    else if(rr>0.52&&rr<0.60) v=M.lite;           // gold ring
    else if(rr>0.46&&rr<0.52) v=M.ring;
    set4(g,W,H,cx+dx,cy+dy,v);
  }
  // pointed finials top & bottom (set4 mirrors)
  const fh=Math.max(3,Math.round(ry*0.34)), fw=Math.max(2,Math.round(rx*0.5));
  const fyc=Math.round(ry)+Math.round(fh*0.5);
  for(let dy=-fh;dy<=fh;dy++) for(let dx=-fw;dx<=fw;dx++){
    const e=Math.abs(dx)/fw+Math.abs(dy)/fh; if(e>1) continue;
    let v=bg; if(e>0.8) v=out; else if(e>0.5) v=M.lite; else v=M.ring;
    set4(g,W,H,cx+dx,cy-fyc+dy,v);
  }
  stampF(g,W,H,cx,cy,STENCILS.rosette7,[out,M.core,M.lite,M.ring],M.lite,0);
  stampF(g,W,H,cx,cy-Math.round(ry*0.42),STENCILS.bud3,[out,M.core,M.lite,M.lite],M.lite,0);
  stampF(g,W,H,cx,cy+Math.round(ry*0.42),STENCILS.bud3,[out,M.core,M.lite,M.lite],M.lite,0);
}
// curvilinear cloud-band spandrel: polar boundary with cusped lobes + arabesque tendrils
function drawSpandrels(g,W,H,fs,P,rnd){
  const S=P.spandrel, u=Math.min(W,H);
  const base=u*0.21, amp=0.17, lobes=3, phase=rnd?rnd()*0.5:0.2;
  const ext=Math.ceil(base*(1+amp))+2;
  for(let dy=0;dy<=ext;dy++) for(let dx=0;dx<=ext;dx++){
    const x=fs+dx, y=fs+dy;
    if(x>=W/2||y>=H/2) continue;
    const r=Math.hypot(dx,dy);
    const s=Math.atan2(dy,dx)/(Math.PI/2);          // 0..1 across the quarter
    const R=base*(1+amp*Math.cos(2*Math.PI*lobes*s+phase));
    if(r>R) continue;
    let v=S.bg;
    if(r>R-1.4) v=P.o;            // dark cloud outline
    else if(r>R-3) v=S.lite;      // cream highlight just inside the edge
    set4(g,W,H,x,y,v);
  }
  // olive palmette with red heart, nested in the cloud
  const c=fs+Math.round(base*0.36);
  stampF(g,W,H,c,c,STENCILS.rosette7,[P.o,(P.leaf!=null?P.leaf:S.fg),S.lite,S.fg],S.lite,0);
  drawTendril(g,W,H,fs,base,P,rnd);
}
// one curling stem; spawns leaves on alternating sides + side-branches; recursive
function sprig(g,W,H,fs,sx,sy,ang,len,curl,P,rnd,depth){
  let px=sx, py=sy, side=1;
  for(let i=0;i<=len;i++){
    const t=i/len;
    ang += curl*0.11 + Math.sin(t*Math.PI*2)*0.04;     // continuous curl
    px+=Math.cos(ang); py+=Math.sin(ang);
    const x=Math.round(px), y=Math.round(py);
    if(x<fs+1||y<fs+1||x>=W/2-1||y>=H/2-1) return;
    set4(g,W,H,x,y,P.stem);
    set4(g,W,H,x,y+0.0,P.stem);
    if(i%3===0){                                        // leaf perpendicular, alternating side
      const la=ang+side*Math.PI/2; side=-side;
      const lx=Math.round(px+Math.cos(la)), ly=Math.round(py+Math.sin(la));
      stampF(g,W,H,lx,ly,STENCILS.leaf3,P.themes[0],P.leaf,0);
    }
    if(i===len-1){                                      // little blossom at the tip
      stampF(g,W,H,x,y,STENCILS.flower5,P.themes[(i+depth)%P.themes.length],P.leaf,0);
    } else if(i%7===3){
      stampF(g,W,H,x,y,STENCILS.bud3,P.themes[1%P.themes.length],P.leaf,0);
    }
    if(depth>0 && i>2 && i%5===0){                      // side-branch curling the other way
      sprig(g,W,H,fs,px,py,ang-curl*1.2,Math.round(len*0.55),-curl*1.3,P,rnd,depth-1);
    }
  }
}
function drawTendril(g,W,H,fs,base,P,rnd){
  const j=()=> (rnd?rnd():Math.random())*0.4-0.2;      // small jitter
  const L=Math.round(base*1.5);
  // main branching shoot down the diagonal, two stems curling opposite ways
  sprig(g,W,H,fs, fs+base*0.58, fs+base*0.58, Math.PI*0.25+j(),  L,        0.9, P,rnd,2);
  sprig(g,W,H,fs, fs+base*0.58, fs+base*0.58, Math.PI*0.25+j(),  Math.round(L*0.8), -1.0, P,rnd,2);
  // two shoots hugging the cusped edge toward each border
  sprig(g,W,H,fs, fs+base*0.9,  fs+base*0.34, Math.PI*0.5+j(),   Math.round(L*0.7),  0.8, P,rnd,1);
  sprig(g,W,H,fs, fs+base*0.34, fs+base*0.9,  0+j(),             Math.round(L*0.7), -0.8, P,rnd,1);
}

// ===== Turkmen guls =====
function gulOcta(dx,dy,ax,ay){ const a=Math.abs(dx),b=Math.abs(dy); return a<=ax&&b<=ay&&(a/ax+b/ay)<=1.38; }
// Tekke gül: flattened octagon, cross-quartered, diagonal 2-colour quarters, internal hooks
function drawGulTekke(g,W,H,cx,cy,r,P){
  const put=(x,y,v)=>{ if(x>=0&&y>=0&&x<W&&y<H) g[y][x]=v; };
  const light=P.gulBoss, dark=P.gulGround, hook=P.gulSecondary, out=P.o;
  const ax=r, ay=Math.max(2,Math.round(r*0.9));
  for(let dy=-ay-1;dy<=ay+1;dy++) for(let dx=-ax-1;dx<=ax+1;dx++){
    if(!gulOcta(dx,dy,ax,ay)) continue;
    let v=((dx>=0)===(dy>=0))? light : dark;                  // diagonal quarter split
    if(!gulOcta(dx+(dx>=0?1:-1),dy,ax,ay)||!gulOcta(dx,dy+(dy>=0?1:-1),ax,ay)) v=out; // octagon rim
    if(dx===0||dy===0) v=out;                                  // quartering cross
    put(cx+dx,cy+dy,v);
  }
  const qx=Math.max(2,Math.round(ax*0.5)), qy=Math.max(2,Math.round(ay*0.5));
  [[qx,qy],[-qx,qy],[qx,-qy],[-qx,-qy]].forEach(([ox,oy])=>{   // a hook in each quarter
    const hc=((ox>=0)===(oy>=0))? dark : light;
    put(cx+ox,cy+oy,hook); put(cx+ox-1,cy+oy,hc); put(cx+ox+1,cy+oy,hc);
    put(cx+ox,cy+oy-1,hc); put(cx+ox,cy+oy+1,hc); put(cx+ox-1,cy+oy-1,hook);
  });
  put(cx,cy,hook); put(cx-1,cy,out); put(cx+1,cy,out); put(cx,cy-1,out); put(cx,cy+1,out);
}
// Yomut "dyrnak" gül: stepped lozenge with latch-hooks + quartering cross
function drawGulDyrnak(g,W,H,cx,cy,r,P){
  const put=(x,y,v)=>{ if(x>=0&&y>=0&&x<W&&y<H) g[y][x]=v; };
  const light=P.gulBoss, dark=P.gulGround, hook=P.gulSecondary, out=P.o;
  const band=Math.max(2,Math.round(r/3));
  for(let dy=-r;dy<=r;dy++) for(let dx=-r;dx<=r;dx++){
    const d=Math.abs(dx)+Math.abs(dy); if(d>r) continue;
    let v=(Math.floor(d/band)%2)? light : dark;
    if(d===r||dx===0||dy===0) v=out;
    put(cx+dx,cy+dy,v);
  }
  for(let t=band;t<r;t+=band){                                 // dyrnak hooks on the edges
    const j=r-t;
    [[t,j],[-t,j],[t,-j],[-t,-j]].forEach(([ox,oy])=>{ put(cx+ox+(ox>0?1:-1),cy+oy,hook); put(cx+ox,cy+oy+(oy>0?1:-1),hook); });
  }
  put(cx,cy,hook); put(cx-1,cy,out); put(cx+1,cy,out); put(cx,cy-1,out); put(cx,cy+1,out);
}
// Ersari "gülli" gül: large octagon, concentric, radial 8-point star inside (not quartered)
function drawGulErsari(g,W,H,cx,cy,r,P){
  const put=(x,y,v)=>{ if(x>=0&&y>=0&&x<W&&y<H) g[y][x]=v; };
  const ivory=P.gulBoss, dark=P.gulGround, red=P.gulSecondary, out=P.o;
  const ax=r, ay=Math.max(2,Math.round(r*1.04));
  const inAx=Math.max(2,Math.round(ax*0.62)), inAy=Math.max(2,Math.round(ay*0.62));
  for(let dy=-ay-1;dy<=ay+1;dy++) for(let dx=-ax-1;dx<=ax+1;dx++){
    if(!gulOcta(dx,dy,ax,ay)) continue;
    let v=ivory;                                                  // ivory outer ring
    if(!gulOcta(dx+(dx>=0?1:-1),dy,ax,ay)||!gulOcta(dx,dy+(dy>=0?1:-1),ax,ay)) v=out;  // outer rim
    if(gulOcta(dx,dy,inAx,inAy)){                                 // dark inner field
      v=dark;
      const nx=dx/inAx, ny=dy/inAy, rr=Math.hypot(nx,ny), ang=Math.atan2(ny,nx);
      if(rr<=0.55+0.45*Math.cos(8*ang)) v=ivory;                 // 8-point star
      if(rr<=0.30) v=red;                                        // red core
      if(!gulOcta(dx+(dx>=0?1:-1),dy,inAx,inAy)||!gulOcta(dx,dy+(dy>=0?1:-1),inAx,inAy)) v=out; // inner rim
    }
    put(cx+dx,cy+dy,v);
  }
  const hx=Math.round(ax*0.82), hy=Math.round(ay*0.82);          // gülli marks on the 4 sides
  [[0,hy],[0,-hy],[hx,0],[-hx,0]].forEach(([ox,oy])=>put(cx+ox,cy+oy,red));
}
function drawGulAfghanRound(g,W,H,cx,cy,r,P){
  const put=(x,y,v)=>{ if(x>=0&&y>=0&&x<W&&y<H) g[y][x]=v; };
  const ivory=P.gulBoss, dark=P.gulGround, red=P.gulSecondary, out=P.o;
  const ax=r, ay=Math.max(2,Math.round(r*0.96));
  for(let dy=-ay;dy<=ay;dy++) for(let dx=-ax;dx<=ax;dx++){
    const nx=dx/ax, ny=dy/ay, rr=Math.hypot(nx,ny);
    if(rr>1) continue;
    let v=dark;
    if(rr>0.86) v=out; else if(rr>0.72) v=ivory;
    if(Math.abs(dx)<2 || Math.abs(dy)<2) v=out;
    if(rr<0.34) v=red;
    put(cx+dx,cy+dy,v);
  }
  const q=Math.max(2,Math.round(r*0.48));
  [[q,q],[-q,q],[q,-q],[-q,-q]].forEach(([ox,oy])=>{
    put(cx+ox,cy+oy,ivory); put(cx+ox+(ox>0?1:-1),cy+oy,out); put(cx+ox,cy+oy+(oy>0?1:-1),red);
  });
}
function drawMiniDiamond(g,W,H,cx,cy,r,cols){
  const put=(x,y,v)=>{ if(x>=0&&y>=0&&x<W&&y<H) g[y][x]=v; };
  for(let d=r;d>=0;d--){ const v=cols[(r-d)%cols.length]; for(let i=-d;i<=d;i++){ const j=d-Math.abs(i); put(cx+i,cy+j,v); put(cx+i,cy-j,v);} }
}
function layoutGul(g,W,H,fs,P,rnd,density){
  const innerW=W-2*fs, innerH=H-2*fs;
  const cell=clampv(Math.round(Math.min(W,H)/(5+density*0.7)*(P.gulScale||1)),10,46);
  const ncol=Math.max(2,Math.round(innerW/cell)), nrow=Math.max(2,Math.round(innerH/cell));
  const cw=innerW/ncol, ch=innerH/nrow;
  const r=Math.max(4,Math.floor(Math.min(cw,ch)*0.44)), rMin=Math.max(2,Math.floor(Math.min(cw,ch)*0.18));
  const drawG=P.gulType==="afghanRound"? drawGulAfghanRound : P.gulType==="dyrnak"? drawGulDyrnak : P.gulType==="ersari"? drawGulErsari : drawGulTekke;
  for(let row=0;row<nrow;row++) for(let col=0;col<ncol;col++)
    drawG(g,W,H,Math.round(fs+cw*(col+0.5)),Math.round(fs+ch*(row+0.5)),r,P);
  for(let row=0;row<nrow-1;row++) for(let col=0;col<ncol-1;col++)
    drawMiniDiamond(g,W,H,Math.round(fs+cw*(col+1)),Math.round(fs+ch*(row+1)),rMin,[P.gulSecondary,P.gulBoss,P.o]);
}
function fillRect(g,W,H,x0,y0,x1,y1,v){
  for(let y=Math.max(0,y0);y<=Math.min(H-1,y1);y++) for(let x=Math.max(0,x0);x<=Math.min(W-1,x1);x++) g[y][x]=v;
}
function rectFrame(g,W,H,x0,y0,x1,y1,P){
  for(let k=0;k<3;k++){
    const v=k===0?P.o:k===1?P.border.fg:P.border.lite;
    for(let x=x0+k;x<=x1-k;x++){ put1(g,W,H,x,y0+k,v); put1(g,W,H,x,y1-k,v); }
    for(let y=y0+k;y<=y1-k;y++){ put1(g,W,H,x0+k,y,v); put1(g,W,H,x1-k,y,v); }
  }
}
function layoutCompartment(g,W,H,fs,P,rnd,density){
  layoutAllover(g,W,H,fs,P,rnd,Math.max(6,density),true);
  const innerW=W-2*fs, innerH=H-2*fs, gap=Math.max(5,Math.round(innerH*0.07));
  const panelW=Math.round(innerW*0.54), panelH=Math.round((innerH-gap)*0.38);
  const x0=Math.round((W-panelW)/2), x1=x0+panelW;
  const yTop=fs+Math.round(innerH*0.08), yBot=H-fs-Math.round(innerH*0.08)-panelH;
  [yTop,yBot].forEach(y0=>{
    const y1=y0+panelH;
    fillRect(g,W,H,x0,y0,x1,y1,P.g);
    rectFrame(g,W,H,x0,y0,x1,y1,P);
    const stripeCount=5;
    for(let i=1;i<stripeCount;i++){
      const sx=Math.round(x0+(panelW*i)/stripeCount);
      for(let y=y0+4;y<y1-4;y++) put1(g,W,H,sx,y,(i&1)?P.stem:P.border.fg);
    }
    const cell=Math.max(7,Math.round(panelH/4));
    for(let y=y0+cell;y<y1-cell/2;y+=cell){
      stampF(g,W,H,x0+Math.round(panelW*0.23),Math.round(y),STENCILS.vineleaf5,pick(rnd,P.themes),P.leaf,0);
      stampF(g,W,H,x0+Math.round(panelW*0.77),Math.round(y),transformStencil(STENCILS.vineleaf5,2,true),pick(rnd,P.themes),P.leaf,0);
      drawMiniDiamond(g,W,H,x0+Math.round(panelW*0.50),Math.round(y),2,[P.border.lite,P.border.fg,P.o]);
    }
  });
}

// Turkmen border: narrow geometric stripes (no floral band)
function drawBordersTurkmen(g,W,H,P,bands){
  const o=P.o, B=P.border, u=Math.min(W,H); let e=0;
  const line=v=>{ setRingRect(g,W,H,e,v); e++; };
  const ws=clampv(Math.round(u/55),2,3);
  line(o);
  bandSawtooth(g,W,H,e,ws,B.bg,B.fg); e+=ws; line(o);
  // main stripe: two-tone beaded line + diamonds
  const wm=clampv(Math.round(u/26),3,5), mid=e+(wm>>1), per=Math.max(3,wm);
  bandFill(g,W,H,e,wm,B.bg);
  for(let x=e+1;x<=W/2;x++) set4(g,W,H,x,mid,(x&1)?B.fg:B.gA);
  for(let y=e+1;y<=H/2;y++) set4(g,W,H,mid,y,(y&1)?B.fg:B.gA);
  const gem=(cx,cy)=>{ set4(g,W,H,cx,cy,B.lite); set4(g,W,H,cx-1,cy,B.fg); set4(g,W,H,cx+1,cy,B.fg); set4(g,W,H,cx,cy-1,B.fg); set4(g,W,H,cx,cy+1,B.fg); };
  for(let x=e+per;x<=W/2;x+=per) gem(x,mid);
  for(let y=e+per;y<=H/2;y+=per) gem(mid,y);
  gem(mid,mid);
  e+=wm; line(o);
  bandSawtooth(g,W,H,e,ws,B.bg,B.gA); e+=ws; line(o);
  for(let i=0;i<bands;i++){ guardRect(g,W,H,e,B.gA,B.gB); e++; line(o); }
  return e;
}

// ===== generate =====
function generate(W,H,rnd,P,density,bands,fieldMode,animals,centralType,sideMeds){
  const g=makeGrid(W,H,P.g);
  const fs=(P.layout==="gul")? drawBordersTurkmen(g,W,H,P,bands) : drawBorders(g,W,H,P,bands);
  const innerW=W-2*fs, innerH=H-2*fs, cx=W>>1, cy=H>>1;
  if(Math.min(innerW,innerH)<8) return g;
  const open=fieldMode==="open";
  const md=Math.min(innerW,innerH);
  const field=(bold,haloR)=>{ open? layoutOpen(g,W,H,fs,P,rnd,density,haloR) : layoutAllover(g,W,H,fs,P,rnd,density,bold);
                              if(animals) scatterAnimals(g,W,H,fs,P,rnd,haloR); };

  if(P.layout==="gul"){
    layoutGul(g,W,H,fs,P,rnd,density);   // Turkmen guls fill the field by design
  } else if(P.layout==="compartment"){
    layoutCompartment(g,W,H,fs,P,rnd,density);
  } else if(P.layout==="rowmedallion"){
    const r=Math.max(4,Math.floor(md*0.22));
    field(true, r*1.2);
    drawSpandrels(g,W,H,fs,P,rnd);
    const dx=Math.floor(innerW*0.27);
    drawMedallion(g,W,H,cx-dx,cy,r,P,rnd); // set4 mirrors -> left+right
    drawMedallion(g,W,H,cx,cy,r,P,rnd);
  } else if(P.layout==="allover"){
    const r=Math.max(4,Math.floor(md*(open?0.27:0.16)));
    field(false, open? r*1.2 : 0);
    if(open || rnd()<0.65) drawMedallion(g,W,H,cx,cy,r,P,rnd);
  } else { // medallion
    const r=Math.max(5,Math.floor(md*(0.27+rnd()*0.05)));
    field(false, r*1.15);
    drawSpandrels(g,W,H,fs,P,rnd);
    // optional dark flanking cartouches left & right (wide rugs only)
    if(sideMeds && !P.noSideMeds && innerW>=innerH*1.25){
      const sr=Math.max(4,Math.round(r*0.5)), sdx=Math.round(innerW*0.31);
      drawMedallion(g,W,H,cx-sdx,cy,sr,P,rnd,{style:"curv",dark:true}); // set4 -> both sides
    }
    // half-medallions centred on the mid-edges, clipped to the field
    if(!P.noEdgeMedallions){
      const hr=Math.max(4,Math.round(r*0.6));
      CLIP={x0:fs,y0:fs,x1:W-1-fs,y1:H-1-fs};
      drawMedallion(g,W,H,cx,fs,hr,P,rnd);   // top & bottom (set4 mirrors y)
      drawMedallion(g,W,H,fs,cy,hr,P,rnd);   // left & right (set4 mirrors x)
      CLIP=null;
    }
    // central element — type varies by seed
    const copts=centralType==="starDark"?{style:"star",dark:true}
               :centralType==="starLight"?{style:"star",dark:false}:null;
    drawMedallion(g,W,H,cx,cy,r,P,rnd,copts);
  }
  return g;
}

// ===== colour / aging =====
function hexRgb(h){ h=h.replace('#',''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
function lerp(a,b,t){ return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t]; }
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const PARCH=[212,196,158], CREASE=[18,12,8];

// abrash: horizontal tonal banding from separate dye lots — a softened random walk over rows
function buildAbrash(H,arnd){
  const nb=6+Math.floor(arnd()*9);
  const bounds=[0]; for(let i=1;i<nb;i++) bounds.push(Math.floor(arnd()*H)); bounds.push(H);
  bounds.sort((a,b)=>a-b);
  const L=new Float32Array(H), T=new Float32Array(H);
  let lv=0, tv=0;
  for(let i=0;i<bounds.length-1;i++){
    lv=clamp(lv+(arnd()*2-1)*0.7,-1,1);     // lightness drift
    tv=clamp(tv+(arnd()*2-1)*0.6,-1,1);     // warm/cool drift
    for(let y=bounds[i];y<bounds[i+1];y++){ L[y]=lv; T[y]=tv; }
  }
  // soften band edges (3-row average)
  const sL=new Float32Array(H), sT=new Float32Array(H), r=2;
  for(let y=0;y<H;y++){ let a=0,b=0,n=0; for(let k=-r;k<=r;k++){ const yy=y+k; if(yy>=0&&yy<H){ a+=L[yy]; b+=T[yy]; n++; } } sL[y]=a/n; sT[y]=b/n; }
  return {L:sL,T:sT};
}

// ===== render =====
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const AFGHAN_KEYS=["afghanElephant","afghanCreamGarden","afghanLobed","afghanTripleDiamond","afghanRedGulGrid","afghanPanelPrayer"];
function clonePreset(P){ return JSON.parse(JSON.stringify(P)); }
function buildAfghanHybrid(rnd){
  const palette=PRESETS[pick(rnd,AFGHAN_KEYS)];
  const layout=PRESETS[pick(rnd,AFGHAN_KEYS)];
  const border=PRESETS[pick(rnd,AFGHAN_KEYS)];
  const motif=PRESETS[pick(rnd,AFGHAN_KEYS)];
  const P=clonePreset(palette);
  ["layout","medalStyle","gulType","gulScale","fieldMood"].forEach(k=>{ if(layout[k]!=null) P[k]=layout[k]; });
  ["border","borderStyle"].forEach(k=>{ if(border[k]!=null) P[k]=clonePreset(border[k]); });
  ["medal","spandrel","themes","stem","leaf","filler","gulGround","gulSecondary","gulBoss","motifPool","fillerPool","borderMotifs"].forEach(k=>{ if(motif[k]!=null) P[k]=clonePreset(motif[k]); });
  P.name="Афганский гибрид";
  P.family=`Афганские гибриды · палитра ${palette.name}, поле ${layout.name}, кайма ${border.name}`;
  P.ref=`mix:${palette.ref}/${layout.ref}/${border.ref}/${motif.ref}`;
  return P;
}
function render(){
  const W=+document.getElementById('res').value;
  const H=Math.round(W/FORMATS[fmt]);
  const bands=+document.getElementById('border').value;
  const wear=+document.getElementById('wear').value;
  const fringe=+document.getElementById('fringe').value;
  // sub-preset, density and "character" are derived from the seed, not manual controls
  const srnd=mulberry32((seed^0x1234abcd)>>>0);
  const keys=CATS[category]||Object.keys(PRESETS);
  style=category==="Афганские гибриды"?"afghanHybrid":keys[Math.floor(srnd()*keys.length)];
  const P=category==="Афганские гибриды"?buildAfghanHybrid(srnd):PRESETS[style];
  const density=4+Math.floor(srnd()*5);
  const fieldMode=P.fieldMood || (srnd()<0.5?"open":"dense");
  const animals=srnd()<0.6;
  const abrash=srnd()<0.3?0:0.18+srnd()*0.4;
  const ct=srnd();
  const centralType=P.centralType || (ct<0.45?"native":(ct<0.75?"starDark":"starLight"));
  const sideMeds=srnd()<0.5;
  const grid=generate(W,H,mulberry32(seed),P,density,bands,fieldMode,animals,centralType,sideMeds);

  const wrnd=mulberry32((seed^0x9e3779b9)>>>0);
  const f1=0.18+wrnd()*0.12,f2=0.15+wrnd()*0.12,p1=wrnd()*6.28,p2=wrnd()*6.28;
  const noise=new Float32Array(W*H); for(let i=0;i<noise.length;i++) noise[i]=wrnd()*2-1;
  const rgb=P.colors.map(hexRgb);
  const A=abrash>0? buildAbrash(H, mulberry32((seed^0x85ebca6b)>>>0)) : null;

  const PX=Math.max(2,Math.floor(1080/W));
  const frC=Math.round(clampv(Math.round(H*0.10),4,12)*fringe);   // fringe rows per end
  canvas.width=W*PX; canvas.height=(H+2*frC)*PX;
  const oy=frC*PX;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const gi=grid[y][x];
    let c=rgb[gi]||rgb[P.g];
    if(A){
      const amt=abrash*(gi===P.g?1:0.4);              // strongest on the ground
      const dl=A.L[y]*amt*22, dt=A.T[y]*amt*13;        // lightness + warm/cool
      c=[c[0]+dl+dt, c[1]+dl, c[2]+dl-dt];
    }
    if(wear>0){
      const band=Math.sin((x+y*0.3)*f1+p1)*0.6+Math.sin((y-x*0.2)*f2+p2)*0.4;
      const w=band*0.7+noise[y*W+x]*0.5;
      const fade=clamp(wear*Math.max(0,w-0.15)*1.4,0,0.82);
      const dark=clamp(wear*Math.max(0,-w-0.20)*1.2,0,0.55);
      if(fade>0) c=lerp(c,PARCH,fade);
      if(dark>0) c=lerp(c,CREASE,dark);
    }
    ctx.fillStyle=`rgb(${clamp(c[0],0,255)|0},${clamp(c[1],0,255)|0},${clamp(c[2],0,255)|0})`;
    ctx.fillRect(x*PX, oy+y*PX, PX,PX);
  }
  // kilim fringe: exposed ivory warp ends, bundled, at top & bottom
  if(frC>0){
    const fr=mulberry32((seed^0xc2b2ae35)>>>0);
    const iv=rgb[lightestIdx(P.colors)];
    const ivD=[iv[0]*0.78,iv[1]*0.76,iv[2]*0.72];
    const fill=(col,cx,cy)=>{ ctx.fillStyle=`rgb(${col[0]|0},${col[1]|0},${col[2]|0})`; ctx.fillRect(cx*PX,cy*PX,PX,PX); };
    for(let x=0;x<W;x++){
      if(x%4===3) continue;                                  // gaps → tied bundles
      const col=(fr()<0.30)?ivD:iv;
      const lt=Math.max(2,Math.round(frC*(0.55+fr()*0.45)));
      for(let k=0;k<lt;k++) fill(col, x, frC-1-k);            // top strand (hangs up)
      fill(ivD, x, frC-1);                                    // knot at carpet edge
      const lb=Math.max(2,Math.round(frC*(0.55+fr()*0.45)));
      for(let k=0;k<lb;k++) fill(col, x, frC+H+k);            // bottom strand (hangs down)
      fill(ivD, x, frC+H);
    }
  }
}

// ===== UI =====
// group presets by category (country); subtype is chosen at random from the seed

const CATS={}; Object.entries(PRESETS).forEach(([k,v])=>{ const c=v.family.split('·')[0].trim(); (CATS[c]=CATS[c]||[]).push(k); });
const I18N={

    category:{

let lang="en";
const stylesEl=document.getElementById('styles');
const catGrid=document.createElement('div'); catGrid.className='styles'; stylesEl.appendChild(catGrid);
CAT_ORDER.forEach(c=>{
  const b=document.createElement('div'); b.className='chip'+(c===category?' on':''); b.dataset.category=c;
  b.onclick=()=>{ category=c; catGrid.querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); b.classList.add('on'); render(); };
  catGrid.appendChild(b);
});
const fmtEl=document.getElementById('fmt');
Object.keys(FORMATS).forEach(k=>{
  const b=document.createElement('div'); b.className='chip'+(k===fmt?' on':''); b.textContent=k;
  b.onclick=()=>{ fmt=k; fmtEl.querySelectorAll('.chip').forEach(c=>c.classList.remove('on')); b.classList.add('on'); render(); };
  fmtEl.appendChild(b);
});
function bindRange(id,valId){ const r=document.getElementById(id),v=document.getElementById(valId); r.oninput=()=>{ v.textContent=r.value; render(); }; }
bindRange('res','resVal'); bindRange('border','borderVal'); bindRange('wear','wearVal'); bindRange('fringe','fringeVal');
document.getElementById('gen').onclick=()=>{ seed=(Math.random()*1e9)|0; render(); };
document.getElementById('save').onclick=()=>{ const a=document.createElement('a'); a.download=`carpet_${style}_${seed.toString(36)}.png`; a.href=canvas.toDataURL('image/png'); a.click(); };
function applyLang(nextLang){
  lang=nextLang;
  const t=I18N[lang];
  document.documentElement.lang=t.htmlLang;
  document.title=t.pageTitle;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=t[el.dataset.i18n]; });
  catGrid.querySelectorAll('.chip').forEach(el=>{ el.textContent=t.category[el.dataset.category]; });
  document.getElementById('langEn').classList.toggle('on',lang==="en");
  document.getElementById('langRu').classList.toggle('on',lang==="ru");
}
document.getElementById('langEn').onclick=()=>applyLang('en');
document.getElementById('langRu').onclick=()=>applyLang('ru');
applyLang(lang);
render();
</script>
